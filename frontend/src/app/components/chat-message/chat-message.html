<div class="chat-message-container" [ngClass]="message.sender" role="listitem">
  <mat-card class="message-card" [ngClass]="message.sender">
    <mat-card-header>
      <div class="header-left">
        <mat-icon class="sender-icon" [ngClass]="message.sender" aria-hidden="true">
          {{ getSenderIcon() }}
        </mat-icon>
        <div class="header-info">
          <h3 class="sender-name">{{ message.senderName }}</h3>
          <time
            class="timestamp"
            [attr.datetime]="message.timestamp.toISOString()"
            [matTooltip]="message.timestamp | date:'medium'"
          >
            {{ message.timestamp | date:'short' }}
          </time>
        </div>
      </div>
    </mat-card-header>
    <mat-card-content>
      <p class="message-text">{{ message.text }}</p>
    </mat-card-content>
  </mat-card>
</div>
